<!DOCTYPE html>
<html>
<head>
  <title>Onshape 3D Modeling Portfolio</title>
  <style>
    body { 
      font-family: "Merienda";
      padding: 20px; 
      max-width: 1200px;
      margin: auto;
      background-color: #264653; /* peacock feather blue */
      color: white;
      position: relative;
    }

    a.back {
      font-size: 20px;
      text-decoration: none;
      color: #e9c46a;
      display: inline-block;
      margin-bottom: 20px;
      font-family: "Merienda";
    }

    /* Corner decorative image */
    .corner-image {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 90px;
      opacity: 0.95;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 5px;
      letter-spacing: 1.5px;
      font-family: "Merienda";
    }

    p {
      font-size: 20px;
      margin-bottom: 20px;
      line-height: 1.5;
      font-family: "Merienda";
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .gallery img {
      width: 200px;
      border-radius: 10px;
      border: 4px solid #e9c46a;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      cursor: pointer;
    }

    /* Popup background */
    .image-popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* Big image */
    .image-popup img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
      border: 4px solid #e9c46a;
    }

    /* Close button */
    .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: white;
      cursor: pointer;
      font-family: Merienda;
    }
  </style>
</head>

<body>

  <!-- Back to Home -->
  <a href="index.html#project2" class="back">← Back to Home</a>


  <!-- Decorative image in top-right corner -->

    function openPopup(src) {

    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
